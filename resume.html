<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>王曉華 - 個人履歷</title>

<style>
body {
    font-family: "Segoe UI", Arial, sans-serif;
    margin: 0;
    padding: 0;
    background: linear-gradient(135deg, #eef2f7, #dfe9f3);
    color: #333;
}

/* 主容器改成左右版 */
.container {
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 25px;
    width: 90%;
    max-width: 1100px;
    margin: 40px auto;
}

/* 左側區塊（header） */
header {
    background: #2c3e50;
    color: white;
    padding: 30px 20px;
    border-radius: 15px;
    text-align: center;
}

/* 照片 */
.profile-pic {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 5px solid white;
    margin-bottom: 15px;
}

/* 名字 */
h1 {
    margin: 10px 0;
    font-size: 26px;
}

/* 右側內容區 */
.section {
    background: white;
    padding: 20px 25px;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    margin-bottom: 20px;
}

/* 標題樣式 */
.section h2 {
    margin-bottom: 10px;
    color: #2c3e50;
    position: relative;
}

.section h2::after {
    content: "";
    display: block;
    width: 40px;
    height: 4px;
    background: #3498db;
    margin-top: 5px;
    border-radius: 2px;
}

/* 清單 */
ul {
    padding-left: 20px;
}

/* 按鈕 */
button {
    padding: 10px 15px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #3498db;
    color: white;
    transition: 0.3s;
}

button:hover {
    background: #217dbb;
}

/* 讓按鈕排整齊 */
button + button {
    margin-left: 10px;
}

/* 深色模式 */
.dark {
    background: #1e1e1e;
}

.dark header {
    background: #111;
}

.dark .section {
    background: #2c2c2c;
    color: #eee;
}

.dark h2 {
    color: #4db8ff;
}
</style>
</head>

<body>

<div class="container" id="resume">
    <header>

        <!-- ✅ 照片 -->
        <img src="images/photo.jpg" alt="個人照片" class="profile-pic">

        <h1>王曉華</h1>
        <p>亞洲大學學生 | 學號：AU114001001</p>
        <p>Email: your_email@example.com | 電話: 09xxxxxxxx</p>
    </header>

    <div class="section">
        <h2>個人簡介</h2>
        <p>
            目前就讀亞洲大學，對未來有明確目標，希望能朝餐飲與咖啡相關產業發展。
            個性認真負責，願意學習新技能，期望透過實務經驗提升自己。
        </p>
    </div>

    <div class="section">
        <h2>學歷</h2>
        <ul>
            <li>亞洲大學（在學中）</li>
        </ul>
    </div>

    <div class="section">
        <h2>技能</h2>
        <ul>
            <li>基礎文書處理（Word / Excel）</li>
            <li>HTML / CSS 基礎</li>
            <li>基礎資料分析</li>
        </ul>
    </div>

    <div class="section">
        <h2>未來目標</h2>
        <p>
            希望未來能成為專業廚師，並創立屬於自己的咖啡館。
        </p>
    </div>

    <button onclick="toggleDarkMode()">切換深色模式</button>
    <button onclick="downloadPDF()">下載 PDF</button>
</div>

<script>
function toggleDarkMode() {
    document.body.classList.toggle("dark");
}

function downloadPDF() {
    window.print();
}
</script>

</body>
</html>
